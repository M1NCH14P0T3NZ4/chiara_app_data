name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flet
        run: pip install flet==0.82.2

      - name: Build APK
        run: flet build apk --project PortoSicuro

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: porto-sicuro-apk
          path: build/apk/*.apk
